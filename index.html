  <title>RetailMaster POS - Modern Retail Management</title>

  <script>
    // Capture PWA install prompt event as early as possible
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPWAInstallPrompt = e;
      console.log('[Early SW] beforeinstallprompt captured globally');
    });
  </script>
